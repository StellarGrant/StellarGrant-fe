version: "3.9"

services:
  api:
    build:
      context: ./api
    environment:
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/stellargrant
    ports:
      - "4000:4000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stellargrant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
